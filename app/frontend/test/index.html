<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN-FLIX</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        html {
            overflow-y: hidden;
        }

        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 8px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent);
            z-index: 1000;
        }

        .logo {
            color: #e50914;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero {
            height: 50vh;
            background: linear-gradient(to top, #141414 0%, #141414 30%, transparent 100%), 
                        url('https://images.unsplash.com/photo-1574375927938-d5a98e8efe85?w=1920') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 4%;
            transition: height 0.3s ease;
        }

        .hero.small {
            height: 15vh;
        }

        .hero.small .hero-content h1 {
            font-size: 20px;
        }

        .hero.small .hero-content p {
            display: none;
        }

        .hero.small .hero-search-container {
            max-width: 400px;
        }

        .hero-content {
            max-width: 600px;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 14px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .hero-search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .hero-search {
            display: flex;
            align-items: center;
            background-color: #fff;
            border-radius: 4px;
            padding: 5px 15px;
            width: 100%;
        }

        .hero-search input {
            flex: 1;
            border: none;
            font-size: 16px;
            outline: none;
            padding: 8px;
        }

        .hero-search button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px 10px;
        }

        .hero-results {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #222;
            border-radius: 4px;
            max-height: 60vh;
            overflow-y: auto;
            z-index: 100;
            margin-top: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-results.active {
            display: block;
        }

        .hero-result-item {
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .hero-result-item:hover {
            background-color: #333;
        }

        .hero-result-item:last-child {
            border-bottom: none;
        }

        .hero-result-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .hero-result-snippet {
            font-size: 13px;
            color: #aaa;
            line-height: 1.4;
        }

        .search-results-section {
            display: none;
            padding: 15px 4%;
            background-color: #141414;
            max-height: 60vh;
            overflow-y: auto;
        }

        .search-results-section.active {
            display: block;
        }

        .search-result-card {
            display: flex;
            gap: 15px;
            padding: 15px;
            background-color: #222;
            border-radius: 4px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .search-result-card:hover {
            background-color: #333;
        }

        .search-result-thumbnail {
            width: 120px;
            height: 70px;
            background: linear-gradient(45deg, #333, #444);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-result-info {
            flex: 1;
            min-width: 0;
        }

        .search-result-card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .search-result-card-snippet {
            font-size: 13px;
            color: #aaa;
            line-height: 1.4;
        }

        .close-search {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .btn-play {
            background-color: #fff;
            color: #000;
        }

        .btn-play:hover {
            background-color: rgba(255,255,255,0.75);
        }

        .btn-info {
            background-color: rgba(109, 109, 110, 0.7);
            color: #fff;
        }

        .btn-info:hover {
            background-color: rgba(109, 109, 110, 0.4);
        }

        .content-section {
            padding: 10px 4%;
            margin-top: -50px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background-color: #141414;
            max-height: 50vh;
            overflow-y: auto;
            transform: translateY(calc(100% - 40px));
            transition: transform 0.3s ease;
        }

        .content-section:hover,
        .content-section.active {
            transform: translateY(0);
        }

        .content-section::before {
            content: '';
            display: block;
            height: 30px;
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            cursor: pointer;
        }

        .content-section-handle {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 25px;
            cursor: pointer;
            color: #666;
            font-size: 12px;
        }

        .content-section-handle::after {
            content: '▲';
            font-size: 10px;
            margin-left: 5px;
        }

        .content-section:hover .content-section-handle::after,
        .content-section.active .content-section-handle::after {
            content: '▼';
        }

        .content-section h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .video-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 10px;
        }

        .video-row::-webkit-scrollbar {
            height: 8px;
        }

        .video-row::-webkit-scrollbar-track {
            background: #333;
            border-radius: 4px;
        }

        .video-row::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }

        .video-row::-webkit-scrollbar-thumb:hover {
            background: #888;
        }

        .video-row::-webkit-scrollbar {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-row:hover::-webkit-scrollbar {
            opacity: 1;
        }

        .video-card {
            min-width: 140px;
            height: 90px;
            background-color: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .video-card:hover {
            transform: scale(1.05);
            z-index: 20;
        }

        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-card-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        }

        .video-card-title {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .video-player-modal.active {
            display: flex;
        }

        .modal-content {
            width: 80%;
            max-width: 1200px;
        }

        .modal-content video {
            width: 100%;
            max-height: 80vh;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            z-index: 2001;
        }

        .category-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .category-tab {
            background: none;
            border: none;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            padding: 8px 12px;
            border-bottom: 3px solid transparent;
        }

        .category-tab.active {
            border-bottom-color: #e50914;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: #000;
            border: 1px solid #fff;
            border-radius: 4px;
            padding: 3px 10px;
        }

        .search-bar input {
            background: none;
            border: none;
            color: #fff;
            font-size: 12px;
            outline: none;
            width: 150px;
        }

        .no-videos {
            color: #aaa;
            padding: 20px;
        }

        .home-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            margin-right: 20px;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .playlist-card {
            min-width: 150px;
            height: 90px;
            background: linear-gradient(135deg, #e50914 0%, #b20710 100%);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .playlist-card-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .playlist-card-title {
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }

        .playlist-card-count {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 3px;
        }

        .playlist-card:hover {
            transform: scale(1.05);
        }

        .back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .scan-btn {
            background-color: #e50914;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .scan-btn:hover {
            background-color: #f40612;
        }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid #e50914;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .scan-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .scan-modal.active {
            display: flex;
        }

        .scan-modal-content {
            background-color: #222;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
        }

        .scan-modal-content h3 {
            margin-bottom: 20px;
        }

        .scan-modal-content button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .scan-modal-content .confirm-btn {
            background-color: #e50914;
            color: #fff;
        }

        .scan-modal-content .cancel-btn {
            background-color: #666;
            color: #fff;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">LAN-FLIX</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="/" class="home-link">Home</a>            
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1>Watch Videos Locally</h1>
            <p>Stream your personal video collection</p>
            <div class="hero-search-container">
                <div class="hero-search">
                    <input type="text" id="hero-search-input" placeholder="Search for movies, shows and more...">
                    <button onclick="heroSearch()">🔍</button>
                </div>
                <div class="hero-results" id="hero-results"></div>
            </div>
        </div>
    </div>

    <div class="search-results-section" id="search-results-section">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
            <h2 id="search-results-title">Search Results</h2>
            <button class="close-search" onclick="clearSearch()">✕</button>
        </div>
        <div id="search-results-list"></div>
    </div>

    <div class="content-section">
        <div class="category-tabs">
            <button class="category-tab active" onclick="filterCategory('all', this)">All Videos</button>           
            <button class="category-tab" onclick="showPlaylists()">My Lists</button>
        </div>

        <button class="back-btn" id="back-btn" style="display: none;" onclick="goBack()">
            ← Back to Browse
        </button>

        <div class="content-section-handle" onclick="toggleContentSection()">
            <span>Videos & Playlists</span>
        </div>

        <div id="video-container">
            <div class="loader"></div>
        </div>
    </div>

    <div class="video-player-modal" id="video-modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <video id="video-player" controls>
                Your browser does not support the video tag.
            </video>
            <h2 id="modal-title" style="margin-top: 20px;"></h2>
        </div>
    </div>

    <div class="scan-modal" id="scan-modal">
        <div class="scan-modal-content">
            <h3>Scan and Load Videos</h3>
            <p style="margin-bottom: 20px; color: #aaa;">This will scan the 'videos' and 'transcriptions' folders and update the database.</p>
            <button class="confirm-btn" onclick="scanAndLoadVideos()">Scan Now</button>
            <button class="cancel-btn" onclick="closeScanModal()">Cancel</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = '/api';
        let allVideos = [];
        let allPlaylists = [];
        let currentView = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            fetchVideos();
            fetchPlaylists();

        document.addEventListener('wheel', function(e) {
            if (e.target.classList.contains('video-row') || e.target.closest('.video-row')) {
                const row = e.target.classList.contains('video-row') ? e.target : e.target.closest('.video-row');
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    row.scrollLeft += e.deltaY;
                }
            }
        }, { passive: false });
        });

        function showScanModal() {
            document.getElementById('scan-modal').classList.add('active');
        }

        function closeScanModal() {
            document.getElementById('scan-modal').classList.remove('active');
        }

        async function scanAndLoadVideos() {
            closeScanModal();
            const container = document.getElementById('video-container');
            container.innerHTML = '<div class="loader"></div>';
            
            try {
                const response = await fetch(`${BACKEND_URL}/videos/scan-and-load/`, { method: 'POST' });
                const data = await response.json();
                alert(`Loaded/Updated ${data.length} videos.`);
                fetchVideos();
                fetchPlaylists();
            } catch (error) {
                console.error('Error scanning and loading videos:', error);
                alert('Error scanning and loading videos. Check console for details.');
                fetchVideos();
            }
        }

        async function fetchVideos() {
            const container = document.getElementById('video-container');
            try {
                const response = await fetch(`${BACKEND_URL}/videos/`);
                allVideos = await response.json();
                if (currentView === 'all') {
                    displayVideos(allVideos);
                }
            } catch (error) {
                console.error('Error fetching videos:', error);
                container.innerHTML = '<p class="no-videos">Error loading videos. Make sure the backend is running.</p>';
            }
        }

        async function fetchPlaylists() {
            try {
                const response = await fetch(`${BACKEND_URL}/playlists/`);
                allPlaylists = await response.json();
            } catch (error) {
                console.error('Error fetching playlists:', error);
            }
        }

        function showPlaylists() {
            currentView = 'playlists';
            document.querySelector('.content-section').classList.add('active');
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            tabs.forEach(tab => {
                if (tab.textContent.toLowerCase().includes('my lists')) {
                    tab.classList.add('active');
                }
            });
            document.getElementById('back-btn').style.display = 'none';
            
            const container = document.getElementById('video-container');
            
            if (allPlaylists.length === 0) {
                container.innerHTML = `
                    <div class="video-row">
                        <p class="no-videos">No playlists found. Create playlists on the main page.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="video-row">
            `;

            allPlaylists.forEach(playlist => {
                html += `
                    <div class="playlist-card" onclick="showPlaylistVideos(${playlist.id})">
                        <div class="playlist-card-icon">📁</div>
                        <div class="playlist-card-title">${playlist.name}</div>
                        <div class="playlist-card-count">${playlist.video_count || 0} videos</div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        async function showPlaylistVideos(playlistId) {
            try {
                const response = await fetch(`${BACKEND_URL}/playlists/${playlistId}`);
                const playlist = await response.json();
                
                currentView = 'playlist';
                document.getElementById('back-btn').style.display = 'flex';
                
                const container = document.getElementById('video-container');
                
                if (!playlist.videos || playlist.videos.length === 0) {
                    container.innerHTML = `
                        <h2>${playlist.name}</h2>
                        <div class="video-row">
                            <p class="no-videos">No videos in this playlist.</p>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <h2>${playlist.name}</h2>
                    <div class="video-row">
                `;

                playlist.videos.forEach(video => {
                    html += `
                        <div class="video-card" onclick="playVideo(${video.id})">
                            <div style="width: 100%; height: 100%; background: linear-gradient(45deg, #333, #444); display: flex; align-items: center; justify-content: center;">
                                <span style="font-size: 48px;">🎬</span>
                            </div>
                            <div class="video-card-overlay">
                                <div class="video-card-title">${video.title}</div>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error fetching playlist videos:', error);
            }
        }

        function toggleContentSection() {
            document.querySelector('.content-section').classList.toggle('active');
        }

        function goBack() {
            currentView = 'playlists';
            document.getElementById('back-btn').style.display = 'none';
            showPlaylists();
        }

        function displayVideos(videos) {
            const container = document.getElementById('video-container');
            
            if (videos.length === 0) {
                container.innerHTML = `
                    <div class="video-row">
                        <p class="no-videos">No videos found. Click "+ Add Videos" to scan and load videos.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="video-row">
            `;

            videos.forEach(video => {
                html += `
                    <div class="video-card" onclick="playVideo(${video.id})">
                        <div style="width: 100%; height: 100%; background: linear-gradient(45deg, #333, #444); display: flex; align-items: center; justify-content: center;">
                            <span style="font-size: 48px;">🎬</span>
                        </div>
                        <div class="video-card-overlay">
                            <div class="video-card-title">${video.title}</div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function playVideo(videoId) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            const title = document.getElementById('modal-title');
            
            const video = allVideos.find(v => v.id === videoId);
            if (video) {
                title.textContent = video.title;
            }

            player.src = `${BACKEND_URL}/videos/${videoId}/stream`;
            modal.classList.add('active');
            player.play();
        }

        function playVideo(videoId, startTime = 0) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            const title = document.getElementById('modal-title');
            
            const video = allVideos.find(v => v.id === videoId);
            if (video) {
                title.textContent = video.title;
            }

            player.src = `${BACKEND_URL}/videos/${videoId}/stream`;

            player.addEventListener('loadedmetadata', function onLoad() {
                player.removeEventListener('loadedmetadata', onLoad);

                if (startTime && !isNaN(startTime)) {
                    player.currentTime = startTime;
                }

                player.play();
            });

            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            player.pause();
            player.src = '';
            modal.classList.remove('active');
        }

        

        document.getElementById('hero-search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                heroSearch();
            }
        });

        document.getElementById('hero-search-input').addEventListener('blur', function() {
            setTimeout(() => {
                document.getElementById('hero-results').classList.remove('active');
            }, 200);
        });

        document.getElementById('hero-search-input').addEventListener('focus', function() {
            const results = document.getElementById('hero-results');
            if (results.children.length > 0) {
                results.classList.add('active');
            }
        });

        function heroSearch() {
            const query = document.getElementById('hero-search-input').value;
            if (!query) return;

            document.querySelector('.hero').classList.add('small');

            const resultsSection = document.getElementById('search-results-section');
            const resultsList = document.getElementById('search-results-list');
            const resultsTitle = document.getElementById('search-results-title');
            
            resultsTitle.textContent = `Search Results for "${query}"`;
            resultsList.innerHTML = '<div style="padding: 20px; text-align: center;">Searching...</div>';
            resultsSection.classList.add('active');

            fetch(`${BACKEND_URL}/search/?query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(results => {
                    if (results.length === 0) {
                        resultsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #aaa;">No results found</div>';
                        return;
                    }

                    let html = '';
                    results.forEach(result => {
                        const snippet = result.snippet || '';
                        const timestamp = extractTimestamp(snippet);

                        html += `
                            <div class="search-result-card" 
                                onclick="playVideo(${result.id}, ${timestamp || 0})">
                                <div class="search-result-thumbnail">
                                    <span style="font-size: 24px;">🎬</span>
                                </div>
                                <div class="search-result-info">
                                    <div class="search-result-card-title">${result.title}</div>
                                    <div class="search-result-card-snippet">${snippet}</div>
                                </div>
                            </div>
                        `;
                    });
                    resultsList.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error searching:', error);
                    resultsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #aaa;">Error searching</div>';
                });
        }

        function clearSearch() {
            document.getElementById('search-results-section').classList.remove('active');
            document.getElementById('hero-search-input').value = '';
            document.querySelector('.hero').classList.remove('small');
        }

        function closeHeroResults() {
            document.getElementById('hero-results').classList.remove('active');
        }

        function filterCategory(category, element) {
            const section = document.querySelector('.content-section');
            if (!section.classList.contains('active')) {
                section.classList.add('active');
            }
            currentView = category;
            document.getElementById('back-btn').style.display = 'none';
            updateTabs(category, element);

            if (category === 'all') {
                displayVideos(allVideos);
            } else {
                const filtered = allVideos.filter(v => 
                    v.title.toLowerCase().includes(category)
                );
                displayVideos(filtered);
            }
        }

        function updateTabs(activeTab, clickedElement) {
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            if (clickedElement) {
                clickedElement.classList.add('active');
            } else {
                tabs.forEach(tab => {
                    const text = tab.textContent.toLowerCase();
                    if ((activeTab === 'all' && text.includes('all videos')) ||
                        (activeTab === 'playlists' && text.includes('my lists'))) {
                        tab.classList.add('active');
                    }
                });
            }
        }

        document.getElementById('video-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.getElementById('scan-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeScanModal();
            }
        });

        function extractTimestamp(text) {
            if (!text) return null;

            // Ищем первое вхождение формата 00:00
            const match = text.match(/\b(\d{2}):(\d{2})\b/);

            if (!match) return null;

            const minutes = parseInt(match[1], 10);
            const seconds = parseInt(match[2], 10);

            return minutes * 60 + seconds;
        }
    </script>
</body>
</html>
