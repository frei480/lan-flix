<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        
        header {
            background: #333;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        header h1 {
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .section h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #f0f0f0;
            font-weight: bold;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-edit {
            background: #007bff;
            color: white;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-edit:hover {
            background: #0056b3;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: Arial, sans-serif;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-save {
            background: #28a745;
            color: white;
        }
        
        .btn-save:hover {
            background: #218838;
        }
        
        .btn-cancel {
            background: #6c757d;
            color: white;
        }
        
        .btn-cancel:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <header>
        <h1>Админ-панель LanFlix</h1>
        <div class="user-info">
            <span id="username">Пользователь</span>
            <button class="logout-btn" onclick="logout()">Выход</button>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <h2>Список видео</h2>
            <table id="videosTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Путь</th>
                        <th>Транскрипция</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно для редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Редактировать видео</h3>
            <form id="editForm">
                <div class="form-group">
                    <label for="videoTitle">Название:</label>
                    <input type="text" id="videoTitle" required>
                </div>
                <div class="form-group">
                    <label for="videoTranscription">Транскрипция:</label>
                    <textarea id="videoTranscription"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="modal-buttons btn-save">Сохранить</button>
                    <button type="button" class="modal-buttons btn-cancel" onclick="closeModal()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentVideoId = null;

        // Проверка авторизации
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            // Извлекаем username из токена (это базовое решение)
            const payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('username').textContent = `Пользователь: ${payload.sub}`;
            loadVideos();
        });

        // Функция GET с авторизацией
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('token');
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            return fetch(url, {...options, headers});
        }

        // Загрузить список видео
        async function loadVideos() {
            try {
                const response = await fetchWithAuth('/admin/videos/');
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    return;
                }
                const videos = await response.json();
                const tbody = document.querySelector('#videosTable tbody');
                tbody.innerHTML = videos.map(video => `
                    <tr>
                        <td>${video.id}</td>
                        <td>${video.title}</td>
                        <td><small>${video.filepath}</small></td>
                        <td><small>${video.transcription ? video.transcription.substring(0, 50) + '...' : 'Нет'}</small></td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="openEditModal(${video.id}, '${video.title}', ${!video.transcription ? 'null' : `'${video.transcription.replace(/'/g, "\\'")}'`})">Редактировать</button>
                                <button class="btn btn-delete" onclick="deleteVideo(${video.id})">Удалить</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                alert('Ошибка загрузки видео: ' + err.message);
            }
        }

        // Открыть модальное окно редактирования
        function openEditModal(id, title, transcription) {
            currentVideoId = id;
            document.getElementById('videoTitle').value = title;
            document.getElementById('videoTranscription').value = transcription || '';
            document.getElementById('editModal').classList.add('show');
        }

        // Закрыть модальное окно
        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            currentVideoId = null;
        }

        // Сохранить изменения видео
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('videoTitle').value;
            const transcription = document.getElementById('videoTranscription').value;
            
            try {
                const response = await fetchWithAuth(`/admin/videos/${currentVideoId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title,
                        transcription,
                        filepath: null, // Не меняем путь
                        playlist_id: null
                    })
                });
                
                if (response.ok) {
                    alert('Видео обновлено!');
                    closeModal();
                    loadVideos();
                } else {
                    alert('Ошибка при обновлении видео');
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        });

        // Удалить видео
        async function deleteVideo(id) {
            if (!confirm('Вы уверены что хотите удалить это видео?')) return;
            
            try {
                const response = await fetchWithAuth(`/admin/videos/${id}`, {method: 'DELETE'});
                if (response.ok) {
                    alert('Видео удалено!');
                    loadVideos();
                } else {
                    alert('Ошибка при удалении видео');
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        // Выход
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        // Закрыть модаль при клике вне её
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('editModal');
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
