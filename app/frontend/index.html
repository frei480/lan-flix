<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN-FLIX</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">LAN-FLIX</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="/" class="home-link" data-i18n="nav.home">Home</a>
            <div class="language-switcher">
                <button class="lang-btn active" onclick="changeLanguage('ru')">RU</button>
                <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
            </div>            
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1 data-i18n="hero.title">Watch Videos Locally</h1>
            <p data-i18n="hero.subtitle">Stream your personal video collection</p>
            <div class="hero-search-container">
                <div class="hero-search">
                    <input type="text" id="hero-search-input" data-i18n-placeholder="hero.search.placeholder" placeholder="Search for movies, shows and more...">
                    <button onclick="heroSearch()">🔍</button>
                </div>
                <div id="hero-results"></div>
            </div>
        </div>
    </div>

    <div class="search-results-section" id="search-results-section">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
            <h2 id="search-results-title" data-i18n="search.results">Search Results</h2>
            <button class="close-search" onclick="clearSearch()">✕</button>
        </div>
        <div id="search-results-list"></div>
    </div>

    <div class="content-section">
        <div class="content-header">
            <div class="category-tabs">
                <button class="category-tab active" onclick="filterCategory('all', this)" data-i18n="tabs.allVideos">All Videos</button>           
                <button class="category-tab" onclick="showPlaylists()" data-i18n="tabs.myLists">My Lists</button>
            </div>
            <div class="manage-playlist">
                <button class="back-btn" id="back-btn" style="display: none;" onclick="goBack()">
                    ← <span data-i18n="buttons.backToBrowse">Back to Browse</span>
                </button>
                <div id="playlist-name"></div>
            </div>
            <div class="content-section-handle" onclick="toggleContentSection()">
                <span data-i18n="section.videosPlaylists">Videos & Playlists</span>
                <div id="pin-icon" class="pin-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12Z" />
        </svg>
    </div>
            </div>

        </div>
        <div id="video-container">
            <div class="video-row" id="video-row">
            <div id ="row-loader" class="loader-anchor"></div>            
            </div>
        </div>
    </div>

    <div class="video-player-modal" id="video-modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-body">
            <div class="modal-content">
                <video id="video-player" controls>
                    <span data-i18n="video.notSupported">Your browser does not support the video tag.</span>
                </video>
                <div class="video-controls-bar">
                    <h2 id="modal-title" style="margin: 0; flex: 1;"></h2>
                    <button class="share-button" onclick="copyShareLink()" data-i18n="buttons.shareWithTimecode" title="Share with current timestamp">
                        <span class="share-icon">🔗</span>
                        <span class="share-text" data-i18n="buttons.share">Share</span>
                    </button>
                </div>
            </div>
            <div class="modal-subtitles" id="video-subtitles"></div>
        </div>
    </div>


<script src="/static/js/i18n.js"></script>
<script src="/common.js"></script>
</body>
</html>
