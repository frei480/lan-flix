<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN-FLIX</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">LAN-FLIX</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="/" class="home-link" data-i18n="nav.home">Home</a>
            <div class="language-switcher">
                <button class="lang-btn active" onclick="changeLanguage('ru')">RU</button>
                <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
            </div>            
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1 data-i18n="hero.title">Watch Videos Locally</h1>
            <p data-i18n="hero.subtitle">Stream your personal video collection</p>
            <div class="hero-search-container">
                <div class="hero-search">
                    <input type="text" id="hero-search-input" data-i18n-placeholder="hero.search.placeholder" placeholder="Search for movies, shows and more...">
                    <button onclick="heroSearch()">🔍</button>
                </div>
                <div id="hero-results"></div>
            </div>
        </div>
    </div>

    <div class="search-results-section" id="search-results-section">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
            <h2 id="search-results-title" data-i18n="search.results">Search Results</h2>
            <button class="close-search" onclick="clearSearch()">✕</button>
        </div>
        <div id="search-results-list"></div>
    </div>

    <div class="content-section">
        <div class="content-header">
            <div class="category-tabs">
                <button class="category-tab active" onclick="filterCategory('all', this)" data-i18n="tabs.allVideos">All Videos</button>           
                <button class="category-tab" onclick="showPlaylists()" data-i18n="tabs.myLists">My Lists</button>
            </div>
            <div class="manage-playlist">
                <button class="back-btn" id="back-btn" style="display: none;" onclick="goBack()">
                    ← <span data-i18n="buttons.backToBrowse">Back to Browse</span>
                </button>
                <div id="playlist-name"></div>
                
            </div>
            <div class="content-section-handle" onclick="toggleContentSection()">
                <span data-i18n="section.videosPlaylists">Videos & Playlists</span>
                <div id="pin-icon" class="pin-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12Z" />
        </svg>
    </div>
            </div>

        </div>
        <div id="video-container">
            <div class="video-row" id="video-row">
            <div id ="row-loader" class="loader-anchor"></div>            
            </div>
        </div>
    </div>

    <div class="video-player-modal" id="video-modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-body">
            <div class="modal-content">
                <video id="video-player" controls>
                    <span data-i18n="video.notSupported">Your browser does not support the video tag.</span>
                </video>
                <div class="video-controls-bar">
                    <h2 id="modal-title" style="margin: 0; flex: 1;"></h2>
                    <button class="copy-button ClipboardButton btn btn-invisible js-clipboard-copy m-2 p-0 d-flex flex-justify-center flex-items-center share-button"
                            aria-label="Copy video link with timestamp"
                            data-copy-feedback="Copied!"
                            data-tooltip-direction="w"
                            onclick="copyShareLink()"
                            title="Share with current timestamp"
                            data-i18n-title="buttons.shareWithTimestamp">
                        <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-copy js-clipboard-copy-icon">
                            <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path>
                            <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
                        </svg>
                        <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-check js-clipboard-check-icon color-fg-success d-none">
                            <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-subtitles" id="video-subtitles"></div>
        </div>
    </div>

    <template id="playlist-name-template">
        <div style="display: flex; align-items: center; gap: 10px;">
            <h2 class="playlist-title"></h2>
            <button class="copy-button ClipboardButton btn btn-invisible js-clipboard-copy m-2 p-0 d-flex flex-justify-center flex-items-center playlist-copy-button"
                    aria-label=""
                    data-copy-feedback="Copied!"
                    data-tooltip-direction="w"
                    onclick="copyPlaylistLink()"
                    title="">
                <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-copy js-clipboard-copy-icon">
                    <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path>
                    <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
                </svg>
                <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-check js-clipboard-check-icon color-fg-success d-none">
                    <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"></path>
                </svg>
            </button>
        </div>
    </template>

<script src="/static/js/i18n.js"></script>
<script src="/common.js"></script>
</body>
</html>
