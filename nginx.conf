# nginx.conf
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Proxy API requests to the backend service
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy admin API requests to the backend service
    location ~ ^/admin/(login|register|videos) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static admin page and assets
    location /admin/ {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    location = /nginx_status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    allow ::1; 
    allow 192.168.1.152;          # Разрешить только localhost
    allow 192.168.1.0/24;
    allow 172.19.0.1;     # Пример: разрешить локальную сеть (при необходимости изменить)
    deny all;                 # Запретить всем остальным
}
}